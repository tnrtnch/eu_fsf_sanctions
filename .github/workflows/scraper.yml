name: EU FSF Worker

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

  repository_dispatch:
    types: [run-sanctions]

concurrency:
  group: eu-fsf-worker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean old files
        run: |
          rm -f eu_fsf_sanctions.json
          rm -f scraper.log
          rm -f debug_response.txt

      - name: Run scraper
        run: |
          set -e

          scrapy crawl eu_spider -L INFO 2>&1 | tee scraper.log

          echo "==== FILES AFTER SCRAPE ===="
          ls -lah

          echo "==== JSON FILES ===="
          find . -name "*.json"

          if [ ! -f eu_fsf_sanctions.json ]; then
            echo "eu_fsf_sanctions.json was not generated"
            exit 1
          fi

      - name: Show scraper log
        if: always()
        run: |
          cat scraper.log || true

      - name: Validate output
        run: |
          python - <<'PY'
          import json

          with open("eu_fsf_sanctions.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          if not isinstance(data, dict):
              raise Exception(
                  f"Root must be dict, got {type(data)}"
              )

          items = data.get("items", [])

          print("Item count:", len(items))

          if len(items) < 100:
              raise Exception(
                  f"Too few items: {len(items)}"
              )

          print("Validation successful")
          PY

      - name: Commit and push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add eu_fsf_sanctions.json

          echo "==== GIT STATUS ===="
          git status

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Auto update eu_fsf_sanctions.json [$(date -u)]"
            git push origin HEAD:main
          fi

      - name: Upload scraper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log
          path: scraper.log

      - name: Upload debug response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-response
          path: debug_response.txt

      - name: Send alert email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587

          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}

          subject: "EU FSF Worker FAILED"

          to: taner9321@gmail.com
          from: ${{ secrets.EMAIL_USER }}

          body: |
            EU FSF worker workflow failed.

            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}